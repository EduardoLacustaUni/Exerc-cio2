# Workflow de Compilação do App Android Nativo

name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Permite disparar o build manualmente pelo painel do GitHub

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew || true
      # Caso o gradlew não esteja versionado com permissão de execução

    - name: Build with Gradle
      working-directory: ./android
      run: |
        # Se o gradle wrapper não existir, inicializa um padrão usando o gradle instalado no runner
        if [ ! -f "gradlew" ]; then
          gradle wrapper --gradle-version 8.2
        fi
        ./gradlew assembleDebug --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: KegelMeditation-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
